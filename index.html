<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Coin Flip</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <link rel="icon" href="icon-192.png" type="image/png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Coin Flip"/>
  <meta name="theme-color" content="#1e1e1e"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #1e1e1e;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    h1 {
      font-family: 'Courier New', monospace;
      color: #ffffff;
      margin-bottom: 40px;
      font-size: 24px;
      letter-spacing: 0.05em;
    }

    /* Coin */
    .coin-scene {
      perspective: 600px;
      width: 150px;
      height: 150px;
      margin-bottom: 36px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s;
    }

    .coin.flipping {
      animation: coinFlip 0.9s ease-in-out forwards;
    }

    .coin.show-No {
      transform: rotateX(180deg);
    }

    @keyframes coinFlip {
      0%   { transform: rotateX(0deg) translateY(0px); }
      20%  { transform: rotateX(540deg) }
      50%  { transform: rotateX(1080deg) }
      75%  { transform: rotateX(1440deg) }
      90%  { transform: rotateX(var(--end-rotation)) }
      100% { transform: rotateX(var(--end-rotation)) }
    }

    .coin-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.1em;
      border: 2px solid #444;
      background-color: #333;
      color: #f0f0f0;
    }

    .coin-Yes {
      border-color: #4f43ae;
      color: #b5b6e4;
    }

    .coin-No {
      transform: rotateX(-180deg);
      border-color: #555;
      color: #aaa;
    }

    .coin-face.idle {
      border-color: #444;
      color: #666;
    }

    .result-label {
      font-size: 22px;
      font-weight: bold;
      height: 32px;
      margin-bottom: 36px;
      min-width: 10px;
      text-align: center;
    }

    .tap-hint {
      font-size: 12px;
      color: #555;
      margin-top: -28px;
      margin-bottom: 36px;
      letter-spacing: 0.05em;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 300px;
    }

    button {
      flex: 1;
      padding: 12px 10px;
      border: none;
      border-radius: 10px;
      background-color: #4f43ae;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s;
      font-family: 'Courier New', monospace;
      font-size: 15px;
    }

    button:hover { background-color: #b5b6e4; color: #1e1e1e; }
    button:active { background-color: #3a3080; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    button.reset-btn {
      background-color: #3a3a3a;
    }
    button.reset-btn:hover { background-color: #555; color: #fff; }
    button.reset-btn:active { background-color: #222; }

    /* Score table */
    table {
      width: 100%;
      max-width: 300px;
      border-collapse: collapse;
      background-color: #2a2a2a;
    }

    th, td {
      text-align: center;
      padding: 10px 8px;
      border: 1px solid #444;
      font-size: 15px;
    }

    th { background-color: #444; font-size: 13px; }
    td { color: #f0f0f0; }
  </style>
</head>
<body>

  <h1>Coin Decide</h1>

  <div class="coin-scene" id="coinScene">
    <div class="coin" id="coin">
      <div class="coin-face coin-Yes idle" id="faceYes">?</div>
      <div class="coin-face coin-No" id="faceNo">?</div>
    </div>
  </div>

  <p class="tap-hint">tap coin to flip</p>

  <div class="result-label" id="result"></div>

  <div class="btn-row">
    <button id="flipBtn" onclick="flip()">Decide</button>
    <button class="reset-btn" onclick="resetCounts()">Reset</button>
  </div>

  <table>
    <thead>
      <tr><th>Yes</th><th>No</th><th>Total</th></tr>
    </thead>
    <tbody>
      <tr>
        <td id="YesCount">0</td>
        <td id="NoCount">0</td>
        <td id="totalCount">0</td>
      </tr>
    </tbody>
  </table>

  <script>
    let Yes = 0, No = 0, flipping = false;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new AudioContext();
      return audioCtx;
    }

    // Coin flip sound: rapid clicks that slow down
    function playFlipSound() {
      try {
        const ctx = getAudioCtx();
        const totalDuration = 0.75;
        // Start fast, slow down
        const clicks = 18;
        for (let i = 0; i < clicks; i++) {
          const progress = i / (clicks - 1);
          // ease-out spacing
          const t = progress * progress * totalDuration;
          const buf = ctx.createBuffer(1, ctx.sampleRate * 0.015, ctx.sampleRate);
          const data = buf.getChannelData(0);
          for (let j = 0; j < data.length; j++) {
            data[j] = (Math.random() * 2 - 1) * Math.exp(-j / (data.length * 0.3));
          }
          const src = ctx.createBufferSource();
          src.buffer = buf;
          const gain = ctx.createGain();
          gain.gain.value = 0.18 + 0.1 * (1 - progress);
          src.connect(gain);
          gain.connect(ctx.destination);
          src.start(ctx.currentTime + t);
        }
      } catch(e) {}
    }

    // Landing thud
    function playLandSound() {
      try {
        const ctx = getAudioCtx();
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.15));
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const gain = ctx.createGain();
        gain.gain.value = 0.5;
        // Low pass for thud feel
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 300;
        src.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        src.start();
      } catch(e) {}
    }

    function flip() {
      if (flipping) return;
      flipping = true;
      document.getElementById('flipBtn').disabled = true;

      const coin = document.getElementById('coin');
      const result = document.getElementById('result');
      const faceYes = document.getElementById('faceYes');
      const faceNo = document.getElementById('faceNo');

      result.textContent = '';
      faceYes.textContent = 'Yes';
      faceNo.textContent = 'No';
      faceYes.classList.remove('idle');

      const isYes = Math.random() < 0.5;
      // Yes = 0deg final, No = 180deg. Add full rotations for effect.
      const endRotation = isYes ? 1800 : 1980;
      coin.style.setProperty('--end-rotation', endRotation + 'deg');

      // Remove previous state classes
      coin.classList.remove('show-No', 'flipping');
      void coin.offsetWidth; // reflow

      coin.classList.add('flipping');
      playFlipSound();

      setTimeout(() => {
        coin.classList.remove('flipping');
        if (!isYes) coin.classList.add('show-No');

        result.textContent = isYes ? 'Yes' : 'No';
        playLandSound();

        if (isYes) Yes++; else No++;
        document.getElementById('YesCount').textContent = Yes;
        document.getElementById('NoCount').textContent = No;
        document.getElementById('totalCount').textContent = Yes + No;

        flipping = false;
        document.getElementById('flipBtn').disabled = false;
      }, 920);
    }

    function resetCounts() {
      Yes = 0; No = 0;
      document.getElementById('YesCount').textContent = 0;
      document.getElementById('NoCount').textContent = 0;
      document.getElementById('totalCount').textContent = 0;
    }

    // Tap coin to flip
    document.getElementById('coinScene').addEventListener('click', flip);

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
